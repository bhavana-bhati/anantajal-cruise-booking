<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f3f3;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            background: white;
            padding: 20px;
            margin: 50px auto;
            max-width: 500px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #28a745;
        }
        p {
            font-size: 1.1rem;
            margin: 10px 0;
        }
        .details {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin-top: 20px;
        }
        .details p {
            margin: 5px 0;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Booking Confirmed! ✅</h1>
        <p>Thank you for booking your cruise with us.</p>
        <div class="details">
            <p><strong>Name:</strong> <span id="name"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Destination:</strong> <span id="destination"></span></p>
            <p><strong>Cabin Type:</strong> <span id="cabin"></span></p>
            <p><strong>Number of People:</strong> <span id="people"></span></p>
            <p><strong>Date:</strong> <span id="date"></span></p>
        </div>
        <a href="index.html" class="back-btn">Back to Home</a>
    </div>

    <script>
        // Get booking details from URL parameters
        const urlParams = new URLSearchParams(window.location.search);

        document.getElementById("name").innerText = urlParams.get("name") || "Bhavana";
        document.getElementById("email").innerText = urlParams.get("email") || "n";
        document.getElementById("destination").innerText = urlParams.get("destination") || "N/A";
        document.getElementById("cabin").innerText = urlParams.get("cabin") || "N/A";
        document.getElementById("people").innerText = urlParams.get("people") || "N/A";
        document.getElementById("date").innerText = urlParams.get("date") || "N/A";
    </script>

</body>
</html>
