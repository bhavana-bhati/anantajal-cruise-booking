<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai - City of Dreams</title>
    <style> 
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: linear-gradient(to right, #2C3E50, #BDC3C7);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .container {
            width: 80%;
            max-width: 600px;
            background: #F4F1EA;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
        }
        .image-container {
            width: 100%;
        }
        .image-container img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .content h1 {
            font-size: 36px;
            color: #2C3E50;
        }
        .content p {
            font-size: 18px;
            margin: 15px 0;
            color: #4A4A4A;
        }
        .btn {
    display: inline-block;
    padding: 12px 25px;
    background: #8B5E3B;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-size: 16px;
    transition: 0.3s;
}

.btn:hover {
    background: #6A482B;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="image-container">
            <img src="mumbai.jpg" alt="Mumbai">
        </div>
        <div class="content">
            <h1>Mumbai - The City of Dreams</h1>
            <p>Mumbai, the financial capital of India, is known for its vibrant nightlife, Bollywood industry, and rich cultural heritage. From iconic landmarks like the Gateway of India to the bustling local markets, Mumbai offers an unforgettable experience.</p>
              <a href="xdev9.html" class="btn">Go Back</a>
        </div>
    </div>
</body>
</html>
