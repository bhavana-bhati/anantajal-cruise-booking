<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333;
        }
        header {
            background-color: #d81b60;
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        .login-section {
            display: flex;
            flex-direction: column;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .login-section input {
            padding: 10px;
            margin: 10px 0;
            font-size: 1rem;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .login-section input[type="submit"] {
            background-color: #d81b60;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .login-section input[type="submit"]:hover {
            background-color: #c2185b;
        }

        .error {
            color: red;
            font-size: 0.9rem;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 20% auto;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .close-btn {
            color: #d81b60;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        .ok-btn {
            padding: 10px 20px;
            background-color: #d81b60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .ok-btn:hover {
            background-color: #c2185b;
        }

        #bookingMessage {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #4CAF50;
            font-weight: bold;
        }

        #bookCruise {
            display: none;
            margin: 20px auto;
            padding: 15px 30px;
            background-color: #d81b60;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #bookCruise:hover {
            background-color: #c2185b;
        }
    </style>
</head>
<body>

    <header>
        <h1>Login/Register</h1>
    </header>

    <section class="login-section">
        <form id="loginForm">
            <label for="first_name">First Name:</label>
            <input type="text" name="first_name" id="first_name" required />
            <p class="error" id="firstNameError"></p>

            <label for="last_name">Last Name:</label>
            <input type="text" name="last_name" id="last_name" required />
            <p class="error" id="lastNameError"></p>

            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required />
            <p class="error" id="passwordError"></p>

            <input type="submit" value="Submit" />
        </form>
    </section>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <p>Profile created successfully</p>
            <button class="ok-btn" onclick="goToBooking()">OK</button>
        </div>
    </div>

    <p id="bookingMessage">You can now book your cruise!</p>
    <button id="bookCruise" onclick="proceedToBooking()">Proceed to Booking</button>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();
        if (validateForm()) {
            showModal();
        }
    });

    function validateForm() {
        let isValid = true;

        const firstName = document.getElementById('first_name').value.trim();
        const lastName = document.getElementById('last_name').value.trim();
        const password = document.getElementById('password').value.trim();

        const nameRegex = /^[A-Za-z]{2,}$/; // ✅ Fixed Regex
        const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{6,}$/; 

        document.getElementById('firstNameError').textContent = "";
        document.getElementById('lastNameError').textContent = "";
        document.getElementById('passwordError').textContent = "";

        if (!nameRegex.test(firstName)) {
            document.getElementById('firstNameError').textContent = "First name must contain only letters (min 2).";
            isValid = false;
        }

        if (!nameRegex.test(lastName)) {
            document.getElementById('lastNameError').textContent = "Last name must contain only letters (min 2).";
            isValid = false;
        }

        if (!passwordRegex.test(password)) {
            document.getElementById('passwordError').textContent = "Password must be at least 6 characters long, include 1 uppercase, 1 number, and 1 special character.";
            isValid = false;
        }

        return isValid;
    }

    function showModal() {
        document.getElementById('successModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('successModal').style.display = 'none';
    }

    function goToBooking() {
        document.getElementById('successModal').style.display = 'none';
        document.getElementById('bookingMessage').style.display = 'block';
        document.getElementById('bookCruise').style.display = 'block';
    }

    function proceedToBooking() {
        window.location.href ='C:/Users/bhavanabhati/OneDrive/Desktop/project/bokking.html';
    }

    window.onclick = function(event) {
        var modal = document.getElementById('successModal');
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }
</script>

</body>
</html>
