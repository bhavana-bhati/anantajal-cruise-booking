

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruise Destination</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
        }
        .destination-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        .destination-card {
            display: flex;
            align-items: center;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 80%;
            padding: 20px;
            transition: transform 0.3s;
        }
        .destination-card:hover {
            transform: scale(1.05);
        }
        .destination-card img {
            width: 300px;
            height: auto;
            border-radius: 10px;
        }
        .destination-info {
            flex: 1;
            padding: 20px;
            text-align: left;
        }
        .price-btn, .more-btn {
            display: inline-block;
            background-color: #c2185b;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .price-btn:hover, .more-btn:hover {
            background-color: #8e1443;
        }
        .reviews-container {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }
        .review-box {
            width: 150px;
            height: 100px;
            background-color: #c2185b;
            border-radius: 10px;
            transition: transform 0.3s, background 0.3s;
        }
        .review-box:hover {
            transform: scale(1.1);
            background-color: #8e1443;
        }
    </style>
</head>
<body>
    <h2 style="color: #c2185b;">Destinations</h2>
    <div class="destination-container">
        <div class="destination-card">
            <img src="cruise-image.jpg" alt="Cruise Image">
            <div class="destination-info">
                <h3>Mumbai - Kochi</h3>
                <p>Duration: 2N/3D</p>
               <p>
                <a href="C:\Users\bhavanabhati\OneDrive\Desktop\project\hover.html" class="more-btn">More</a>
            </div>
            <div class="reviews-container">
                <div class="review-box"></div>
                <div class="review-box"></div>
                <div class="review-box"></div>
            </div>
        </div>
    </div>
    <h2 style="color: #c2185b;">Destinations</h2>
</body>
</html>
