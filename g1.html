<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruise Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f0f0f0;
        }
        .gallery-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .gallery-title {
            text-align: left;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .gallery-section {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            position: relative;
        }
        .gallery-section img {
            width: 30%;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .gallery-section img:hover {
            transform: scale(1.05);
        }
        .view-gallery {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: #800080;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
        }
        .lightbox.active {
            visibility: visible;
            opacity: 1;
        }
        .nav-button {
            position: absolute;
            top: 50%;
            background: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-size: 20px;
            border-radius: 50%;
        }
        .prev {
            left: 20px;
        }
        .next {
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <h2 class="gallery-title">GALLERY</h2>
        <p>Quick Tour of Our Cruise</p>
        <div class="gallery-section">
            <img src="d1.jpg" alt="Gallery Image 1" onclick="openLightbox(0)">
            <img src="facility.jpg" alt="Gallery Image 2" onclick="openLightbox(1)">
            <img src="adventure.jpg" alt="Gallery Image 3" onclick="openLightbox(2)">
            <img src="holiday.jpg" alt="Gallery Image 4" onclick="openLightbox(3)">
            <img src="waterpark.jpg" alt="Gallery Image 5" onclick="openLightbox(4)">
            <img src="n2.webp" alt="Gallery Image 6" onclick="openLightbox(5)">
            <button class="view-gallery" onclick="openLightbox(0)">View Gallery</button>
        </div>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="nav-button prev" onclick="prevImage()">&#10094;</button>
        <img id="lightbox-img" src="">
        <button class="nav-button next" onclick="nextImage()">&#10095;</button>
    </div>

    <script>
        const images = [
            "d1.jpg", "facility.jpg", "adventure.jpg", "holiday.jpg", "waterpark.jpg", "n2.webp"
        ];
        let currentIndex = 0;
        function openLightbox(index) {
            currentIndex = index;
            document.getElementById("lightbox-img").src = images[currentIndex];
            document.getElementById("lightbox").classList.add("active");
        }
        function closeLightbox() {
            document.getElementById("lightbox").classList.remove("active");
        }
        function prevImage() {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            document.getElementById("lightbox-img").src = images[currentIndex];
        }
        function nextImage() {
            currentIndex = (currentIndex + 1) % images.length;
            document.getElementById("lightbox-img").src = images[currentIndex];
        }
    </script>
</body>
</html>
