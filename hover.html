<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect Cards</title>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fce4ec;
        }

        .facility-cards {
            display: flex;
            flex-direction: row; /* Ensures cards are in a row */
            gap: 10px;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .card {
            width: 290px;
            height: 380px;
            position: relative;
            overflow: hidden;
            box-shadow: 0px 7px 10px rgba(0, 0, 0, 0.5);
            transition: 0.5s ease-in-out;
            border-radius: 15px;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* Hover Effect - Gradient Overlay */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 176, 155, 0.5), rgba(150, 201, 61, 1));
            z-index: 2;
            transition: 0.5s ease-in-out;
            opacity: 0;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .card .info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
            color: white;
            z-index: 3;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.5s ease-in-out;
        }

     
        .card:hover .info {
            opacity: 1;
            transform: translateY(0);
        }

        .card .info h3 {
            font-size: 22px;
            margin: 0;
        }

        .card .info p {
            font-size: 14px;
            margin: 8px 0 12px;
        }

        .card .info .btn {
            text-decoration: none;
            padding: 10px 15px;
            background: white;
            color: black;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.4s;
        }

        .card .info .btn:hover {
            background: #00b09b;
            color: white;
        }
    </style>
</head>
