<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Effect Cards</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Lato', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #fce4ec;
        }

        .facility-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-wrap: nowrap;
        }

        .card {
            width: 300px;
            height: 400px;
            position: relative;
            overflow: hidden;
            box-shadow: 0px 7px 10px rgba(0, 0, 0, 0.5);
            transition: 0.5s ease-in-out;
            border-radius: 15px;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0, 176, 155, 0.5), rgba(150, 201, 61, 1));
            z-index: 2;
            transition: 0.5s ease-in-out;
            opacity: 0;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .card .info {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            text-align: center;
            color: white;
            z-index: 3;
            opacity: 0;
            transform: translateY(30px);
            transition: 0.5s ease-in-out;
        }

        .card:hover .info {
            opacity: 1;
            transform: translateY(0);
        }

        .book-now {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #c2185b;
            color: white;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .book-now:hover {
            background-color: #8e1443;
        }
    </style>
    <script>
        function bookNow() {
            const isLoggedIn = false; // Replace with actual login check logic
            if (!isLoggedIn) {
                alert('Please log in to book your experience.');
                window.location.href = 'login.html'; // Redirect to login page
            } else {
                alert('Booking successful!');
            }
        }
    </script>
</head>
<body>

<section id="facility"> 
    <div class="facility-cards">
        <div class="card">
            <img src="d5.avif" alt="Dining">
            <div class="info">
                <h3>DINING</h3>
                <p>Enjoy our premium dining experience.</p>
                <a href="dining.html" class="btn">Read more</a>
            </div>
        </div>

        <div class="card">
            <img src="w4.jpg" alt="Wedding">
            <div class="info">
                <h3>WEDDING</h3>
                <p>Make your dream wedding a reality.</p>
                <a href="wedding.html" class="btn">Read more</a>
            </div>
        </div>

        <div class="card">
            <img src="w3.jpg" alt="Adventure">
            <div class="info">
                <h3>ADVENTURE</h3>
                <p>Get ready for thrilling adventures.</p>
                <a href="adv.html" class="btn">Read more</a>
            </div>
        </div>

        <div class="card">
            <img src="nightparty.webp" alt="Party">
            <div class="info">
                <h3>PARTY</h3>
                <p>Experience the best parties onboard.</p>
                <a href="party.html" class="btn">Read more</a>
            </div>
        </div>
    </div>
</section>

<button class="book-now" onclick="bookNow()">Book Now</button>

</body>
</html>
