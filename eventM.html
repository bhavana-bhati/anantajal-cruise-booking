<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background: #ff4081;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            font-size: 24px;
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 8px 15px;
            border-radius: 5px;
        }

        nav a:hover {
            background: #ff0066;
        }

        .banner {
            background: url('EM1.jpg') no-repeat center center/cover;
            height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .container {
            padding: 30px;
            background: white;
            margin: 20px auto;
            width: 80%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        button {
            background: #ff4081;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #ff0066;
        }

        /* Login Popup */
        .login-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            text-align: center;
            display: block;
        }

        .login-popup input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .login-popup button {
            background: #ff4081;
            border: none;
            padding: 10px 20px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
        }

        .login-popup button:hover {
            background: #ff0066;
        }

        /* Hide main content until login */
        #mainContent {
            display: none;
        }

    </style>
    <script>
        function checkLogin() {
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;
            
            if (username === "sunny" && password === "sunny") {
                alert("Login successful!");
                document.getElementById("loginPopup").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
            } else {
                alert("Invalid credentials. Try again.");
            }
        }
    </script>
</head>
<body>

    <!-- Login Popup -->
    <div class="login-popup" id="loginPopup">
        <h2>Login to Access</h2>
        <input type="text" id="username" placeholder="Enter Username" required>
        <input type="password" id="password" placeholder="Enter Password" required>
        <button onclick="checkLogin()">Login</button>
    </div>

    <!-- Main Website Content (Hidden until login) -->
    <div id="mainContent">
        <header>Event Management</header>

        <!-- Navigation Menu -->
        <nav>
            <a href="home.html">Home</a>
            <a href="eabout.html">About</a>
            <a href="ega.html">Gallery</a>
            <a href="Econtact.html">Contact</a>
        </nav>

        <div class="banner">
            Make Every Event Memorable!
        </div>

        <div class="container">
            <h2>Plan Your Perfect Birthday or Anniversary</h2>
            <p>We provide top-notch event management services to make your celebrations unforgettable.</p>
            <button onclick="window.location.href='Econtact.html'">Book Now</button>    
        </div>
    </div>

</body>
</html>
