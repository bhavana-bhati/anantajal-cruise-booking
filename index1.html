<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cordelia Cruises</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f0f7;
            color: #333;
        }
        header {
            background-color: #d81b60; /* Magenta */
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
        }
        .navbar ul li {
            margin: 0 15px;
        }
        .navbar ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .navbar ul li a:hover {
            background-color: #9c1448;
        }
        section {
            padding: 50px 20px;
            text-align: center;
        }
        #hero {
            position: relative;
            text-align: center;
            color: white;
            height: 80vh;
            overflow: hidden;
        }
        #hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
        }
        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
        }
        .hero-text h2 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }
        .hero-text p {
            font-size: 1.2rem;
        }
        .cta-btn {
            background-color: #c2185b;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            display: inline-block;
        }
        .cta-btn:hover {
            background-color: #9c1448;
            transform: scale(1.1);
            transition: transform 0.3s ease-in-out;
        }
        footer {
            background-color: #880e4f;
            color: white;
            text-align: center;
            padding: 15px 0;
        }

        /* Gallery Styles */
        #gallery {
            background-color: #ffe4e1;
        }
        .gallery-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .gallery-card {
            width: calc(33.333% - 20px);
            margin: 10px;
            background-color: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .gallery-card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .gallery-card h3 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
